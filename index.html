<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tutor Tracker</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='80'>&#x1F5D3;&#xFE0F;</text></svg>" />
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', 'Segoe UI', sans-serif; background: #f0f4f8; min-height: 100vh; padding-bottom: 68px; }
  button { font-family: inherit; cursor: pointer; }
  input, select, textarea { font-family: inherit; }
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); display: flex; align-items: center; justify-content: center; z-index: 200; }
  .modal { background: #fff; border-radius: 14px; padding: 24px; width: min(340px, 94vw); box-shadow: 0 20px 60px rgba(0,0,0,0.15); max-height: 90vh; overflow-y: auto; }
  .modal h3 { font-size: 16px; font-weight: 800; color: #0f172a; margin-bottom: 14px; }
  .modal label { font-size: 11px; font-weight: 600; color: #64748b; display: block; margin-bottom: 3px; margin-top: 10px; }
  .modal input, .modal select { width: 100%; border: 1.5px solid #e2e8f0; border-radius: 7px; padding: 8px 10px; font-size: 13px; color: #0f172a; background: #f8fafc; outline: none; }
  .modal .row { display: flex; gap: 8px; margin-top: 16px; }
  .btn-primary { flex: 1; background: #1e3a5f; color: #fff; border: none; border-radius: 8px; padding: 10px 0; font-weight: 700; font-size: 14px; cursor: pointer; }
  .btn-cancel { background: #f1f5f9; color: #64748b; border: none; border-radius: 8px; padding: 10px 16px; font-weight: 700; font-size: 14px; cursor: pointer; }
  .btn-danger { background: #fee2e2; color: #dc2626; border: none; border-radius: 7px; padding: 5px 12px; font-size: 12px; font-weight: 700; cursor: pointer; }
  .add-btn { background: #f1f5f9; border: 1.5px dashed #cbd5e1; border-radius: 8px; padding: 8px 16px; font-size: 13px; color: #64748b; width: 100%; margin-top: 4px; cursor: pointer; }
  .card { background: #fff; border-radius: 12px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
  .tag { display: inline-block; border-radius: 5px; padding: 2px 7px; font-size: 10px; font-weight: 600; cursor: pointer; }
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1.5px solid #e2e8f0; display: flex; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
  .nav-tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 8px 0 10px; border: none; background: transparent; cursor: pointer; font-family: inherit; gap: 2px; }
  .nav-tab-icon { font-size: 20px; line-height: 1; }
  .nav-tab-label { font-size: 10px; font-weight: 700; letter-spacing: 0.2px; }

  /* Sign-in screen */
  .signin-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 24px; background: #f0f4f8; }
  .signin-logo { font-size: 56px; margin-bottom: 16px; }
  .signin-title { font-size: 26px; font-weight: 900; color: #1e3a5f; margin-bottom: 6px; }
  .signin-sub { font-size: 14px; color: #64748b; margin-bottom: 40px; text-align: center; line-height: 1.5; }
  .google-btn { display: flex; align-items: center; gap: 12px; background: #fff; border: 1.5px solid #e2e8f0; border-radius: 12px; padding: 14px 24px; font-size: 15px; font-weight: 700; color: #0f172a; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.08); transition: box-shadow 0.15s; width: 100%; max-width: 300px; justify-content: center; }
  .google-btn:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
  .google-btn svg { width: 22px; height: 22px; flex-shrink: 0; }
  .signin-note { font-size: 11px; color: #94a3b8; margin-top: 20px; text-align: center; max-width: 260px; line-height: 1.5; }
</style>
</head>
<body>
<div id="app"></div>
<script>
const DAYS=["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
const SHORT=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
const CLASS_COLORS=[{bg:"#dbeafe",border:"#3b82f6",text:"#1d4ed8"},{bg:"#fce7f3",border:"#ec4899",text:"#be185d"},{bg:"#d1fae5",border:"#10b981",text:"#065f46"},{bg:"#ede9fe",border:"#8b5cf6",text:"#5b21b6"},{bg:"#ffedd5",border:"#f97316",text:"#9a3412"},{bg:"#cffafe",border:"#06b6d4",text:"#155e75"},{bg:"#fef9c3",border:"#eab308",text:"#713f12"},{bg:"#ffe4e6",border:"#f43f5e",text:"#9f1239"}];
let uid=()=>Math.random().toString(36).slice(2,8);
function toISO(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function formatDate(d){return `${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}`;}
function getMondayOf(date){const d=new Date(date),day=d.getDay();d.setDate(d.getDate()+(day===0?-6:1-day));d.setHours(0,0,0,0);return d;}
function addDays(date,n){const d=new Date(date);d.setDate(d.getDate()+n);return d;}
function buildWeeks(mon){const w=[];for(let i=0;i<4;i++){const wk=[];for(let d=0;d<7;d++)wk.push(addDays(mon,i*7+d));w.push(wk);}return w;}
const todayISO=toISO(new Date());
const baseMonday=getMondayOf(new Date());
const weeks=buildWeeks(baseMonday);
const firebaseConfig={apiKey:"AIzaSyDC8kNTggQ2E0yn6L5flZKBDfEcFZ2dse4",authDomain:"tutor-tracker-10819.firebaseapp.com",databaseURL:"https://tutor-tracker-10819-default-rtdb.firebaseio.com",projectId:"tutor-tracker-10819",storageBucket:"tutor-tracker-10819.firebasestorage.app",messagingSenderId:"1060597127713",appId:"1:1060597127713:web:3304a5e20521c60032e160"};
let db=null,auth=null,dataListener=null;
let state={data:{students:[],classes:[],attendance:{},collected:{}},view:"week",selectedDate:todayISO,selectedClass:null,modal:null,form:{},connected:false,syncing:true,syncError:false,user:null,authReady:false};

function userPath(){ return 'data/'+state.user.uid; }
function setState(patch){Object.assign(state,patch);render();}
function fbSet(path,value){if(!db)return;db.ref(path).set(value).catch(e=>{console.error(e);setState({syncError:true});});}
function fbRemove(path){if(!db)return;db.ref(path).remove().catch(e=>{console.error(e);setState({syncError:true});});}
function getStudent(id){return state.data.students.find(s=>s.id===id);}
function getClass(id){return state.data.classes.find(c=>c.id===id);}
function getTimeForDay(cls,dayName){if(cls.schedule&&cls.schedule[dayName])return cls.schedule[dayName];return cls.time||"";}
function getDays(cls){if(cls.schedule)return Object.keys(cls.schedule);return cls.days||[];}
function classesOnDay(dayName){return state.data.classes.filter(c=>getDays(c).includes(dayName)).sort((a,b)=>getTimeForDay(a,dayName).localeCompare(getTimeForDay(b,dayName)));}
function hasTutoringOnDate(dateObj){const raw=dateObj.getDay();const dayName=raw===0?"Sunday":DAYS[raw-1];return state.data.classes.some(c=>getDays(c).includes(dayName));}
function studentsInClass(cls){return(cls.studentIds||[]).map(id=>getStudent(id)).filter(Boolean);}
function attKey(classId,studentId,date){return `${classId}__${studentId}__${date}`;}
function getAttStatus(classId,studentId,date){return(state.data.attendance||{})[attKey(classId,studentId,date)]||null;}
function totalSessions(studentId){return Object.entries(state.data.attendance||{}).filter(([k,v])=>{const parts=k.split('__');return parts[1]===studentId&&(v==='present'||v==='absent_parent');}).length;}
function sessionsSinceCollection(studentId){const total=totalSessions(studentId);const entry=(state.data.collected||{})[studentId];if(!entry)return total;if(typeof entry==='object'&&entry.atSession!==undefined)return total-entry.atSession;const threshold=studentThreshold(studentId);return total%threshold===0&&total>0?threshold:total%threshold;}
function wasCollectedOnTime(studentId){const entry=(state.data.collected||{})[studentId];if(!entry||typeof entry!=='object')return false;const threshold=studentThreshold(studentId);return entry.onTime===true&&(entry.atSession!==undefined?sessionsSinceCollection(studentId)<threshold:false);}
function studentThreshold(studentId){const daysPerWeek=state.data.classes.filter(c=>(c.studentIds||[]).includes(studentId)).reduce((sum,c)=>getDays(c).length+sum,0);return Math.max(daysPerWeek,1)*4;}
function getAlerts(){return state.data.students.filter(stu=>{const threshold=studentThreshold(stu.id);const progress=sessionsSinceCollection(stu.id);return progress>=threshold;}).map(stu=>({studentId:stu.id,studentName:stu.name,fee:stu.fee,pending:sessionsSinceCollection(stu.id),threshold:studentThreshold(stu.id)}));}
function addClass(){const{name,schedule}=state.form;if(!name||!schedule||!Object.keys(schedule).length)return alert("Fill in class name and pick at least one day with a time.");for(const[day,time]of Object.entries(schedule)){if(!time.trim())return alert("Please set a time for "+day);}const cls={id:uid(),name,schedule,studentIds:[]};state.data.classes.push(cls);fbSet(userPath()+'/classes',state.data.classes);setState({modal:null,form:{}});}
function deleteClass(id){if(!confirm("Delete this class?"))return;state.data.classes=state.data.classes.filter(c=>c.id!==id);fbSet(userPath()+'/classes',state.data.classes);setState({selectedClass:null,view:"week"});}
function editClass(){const{classId,name,schedule}=state.form;if(!name||!schedule||!Object.keys(schedule).length)return alert("Fill in class name and pick at least one day with a time.");for(const[day,time]of Object.entries(schedule)){if(!time.trim())return alert("Please set a time for "+day);}const cls=state.data.classes.find(c=>c.id===classId);if(!cls)return;cls.name=name;cls.schedule=schedule;delete cls.days;delete cls.time;fbSet(userPath()+'/classes',state.data.classes);setState({modal:null,form:{}});}
function saveStudentAssignments(classId,studentIds){const cls=state.data.classes.find(c=>c.id===classId);if(!cls)return;cls.studentIds=studentIds;fbSet(userPath()+'/classes',state.data.classes);setState({modal:null,form:{}});}
function addStudent(){const{name,fee}=state.form;if(!name)return alert("Enter student name.");const stu={id:uid(),name,fee:parseFloat(fee)||0};state.data.students.push(stu);fbSet(userPath()+'/students',state.data.students);setState({modal:null,form:{}});}
function editStudent(studentId){const{name,fee}=state.form;if(!name)return alert("Enter student name.");const stu=state.data.students.find(s=>s.id===studentId);if(!stu)return;stu.name=name;stu.fee=parseFloat(fee)||0;fbSet(userPath()+'/students',state.data.students);setState({modal:null,form:{}});}
function deleteStudent(studentId){if(!confirm("Remove this student? Their attendance history will be kept."))return;state.data.students=state.data.students.filter(s=>s.id!==studentId);state.data.classes.forEach(c=>{c.studentIds=(c.studentIds||[]).filter(id=>id!==studentId);});fbSet(userPath()+'/students',state.data.students);fbSet(userPath()+'/classes',state.data.classes);setState({modal:null,form:{},selectedStudent:null});}
function setAttendance(classId,studentId,date,value){if(!state.data.attendance)state.data.attendance={};const key=attKey(classId,studentId,date);const safeKey=key.replace(/\./g,'_');if(value===null){delete state.data.attendance[key];fbRemove(userPath()+`/attendance/${safeKey}`);}else{state.data.attendance[key]=value;fbSet(userPath()+`/attendance/${safeKey}`,value);}render();}
function markCollected(studentId){if(!state.data.collected)state.data.collected={};const threshold=studentThreshold(studentId);const total=totalSessions(studentId);const progress=sessionsSinceCollection(studentId);const isOnTime=progress<=threshold;state.data.collected[studentId]={atSession:total,onTime:isOnTime};fbSet(userPath()+`/collected/${studentId}`,state.data.collected[studentId]);render();}

function signIn(){
  const provider=new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(e=>{
    // fallback to redirect on mobile
    auth.signInWithRedirect(provider);
  });
}
function signOut(){if(!confirm("Sign out?"))return;if(dataListener){db.ref(userPath()).off();dataListener=null;}auth.signOut();}

function startDataListener(){
  if(dataListener)return;
  dataListener=true;
  db.ref(userPath()).on("value",snap=>{
    const val=snap.val();
    if(val){
      state.data.students=val.students||[];
      state.data.classes=val.classes||[];
      state.data.attendance=val.attendance||{};
      state.data.collected=val.collected||{};
    } else {
      state.data={students:[],classes:[],attendance:{},collected:{}};
    }
    setState({syncing:false,syncError:false});
  },err=>{console.error(err);setState({syncing:false,syncError:true});});
}

function el(tag,attrs={},...children){const e=document.createElement(tag);for(const[k,v]of Object.entries(attrs)){if(k==="style"&&typeof v==="object")Object.assign(e.style,v);else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);else if(k==="className")e.className=v;else e.setAttribute(k,v);}for(const c of children){if(c==null||c===false)continue;e.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(c):c);}return e;}
function div(a,...c){return el("div",a,...c);}
function btn(a,...c){return el("button",a,...c);}
function span(a,...c){return el("span",a,...c);}

function renderSignIn(){
  const googleIcon=`<svg viewBox="0 0 48 48"><path fill="#4285F4" d="M44.5 20H24v8.5h11.8C34.7 33.9 29.8 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 5.1 29.6 3 24 3 12.9 3 4 11.9 4 23s8.9 20 20 20c11 0 19.7-7.9 19.7-20 0-1.3-.1-2.7-.2-4z"/><path fill="#34A853" d="M6.3 14.7l7 5.1C15 16.1 19.2 13 24 13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 5.1 29.6 3 24 3 16.3 3 9.7 7.9 6.3 14.7z"/><path fill="#FBBC05" d="M24 43c5.6 0 10.6-1.9 14.5-5.1l-6.7-5.5C29.8 34.4 27 35.5 24 35.5c-5.7 0-10.6-3.9-12.3-9.2l-7 5.4C8 38.7 15.4 43 24 43z"/><path fill="#EA4335" d="M44.5 20H24v8.5h11.8c-.8 2.4-2.3 4.4-4.3 5.8l6.7 5.5C42.4 36 45 30 45 23c0-1.3-.1-2.7-.5-3z"/></svg>`;
  const appDiv=document.getElementById("app");
  appDiv.innerHTML="";
  appDiv.appendChild(
    div({className:"signin-screen"},
      div({className:"signin-logo"},"📅"),
      div({className:"signin-title"},"Tutor Tracker"),
      div({className:"signin-sub"},"Keep track of your tutoring schedule, attendance, and tuition — all in one place."),
      btn({className:"google-btn",onClick:signIn},
        el("span",{},googleIcon.replace('<svg','<svg xmlns="http://www.w3.org/2000/svg"')),
        "Continue with Google"
      ),
      div({className:"signin-note"},"Your data is private. Only you can see your classes and students.")
    )
  );
  // Actually set innerHTML for SVG to work
  document.querySelector(".google-btn span").innerHTML=googleIcon;
}

function renderWeekTimetable(){
  const weekDates=[];
  for(let i=0;i<7;i++)weekDates.push(addDays(baseMonday,i));
  const dayCards=weekDates.map((d,i)=>{
    const iso=toISO(d),isToday=iso===todayISO,isSel=iso===state.selectedDate;
    const isPast=d<new Date(todayISO),dayName=DAYS[i],dayCls=classesOnDay(dayName);
    return div({style:{background:isSel?"#f0f6ff":"#fff",border:`1.5px solid ${isToday?"#3b82f6":isSel?"#bfdbfe":"#e2e8f0"}`,borderRadius:"10px",marginBottom:"8px",overflow:"hidden",cursor:"pointer"},onClick:()=>setState({selectedDate:iso})},
      div({style:{display:"flex",alignItems:"center",gap:"8px",padding:"10px 14px",background:isToday?"#1e3a5f":isSel?"#eff6ff":"transparent"}},
        span({style:{fontSize:"13px",fontWeight:800,color:isToday?"#fff":isPast?"#94a3b8":"#0f172a",minWidth:"30px"}},SHORT[i]),
        span({style:{fontSize:"12px",color:isToday?"#93c5fd":isPast?"#cbd5e1":"#64748b"}},d.getDate()+" "+MONTHS[d.getMonth()].slice(0,3)),
        isToday?span({style:{background:"#3b82f6",color:"#fff",borderRadius:"5px",padding:"1px 7px",fontSize:"10px",fontWeight:700}},"Today"):span({}),
        dayCls.length>0?span({style:{marginLeft:"auto",fontSize:"10px",fontWeight:600,color:isToday?"#93c5fd":isSel?"#3b82f6":"#94a3b8"}},dayCls.length+" class"+(dayCls.length>1?"es":"")):span({})
      ),
      dayCls.length>0?div({style:{padding:"8px 14px 10px",display:"flex",flexDirection:"column",gap:"6px"}},
        ...dayCls.map(cls=>{
          const col=getClassColor(cls.id),stuCount=(cls.studentIds||[]).length;
          return div({style:{display:"flex",alignItems:"center",gap:"10px",background:col.bg,borderLeft:`3px solid ${col.border}`,borderRadius:"7px",padding:"9px 12px",cursor:"pointer"},
            onClick:e=>{e.stopPropagation();setState({view:"class",selectedClass:cls.id});}},
            div({style:{flex:1,minWidth:0}},
              div({style:{fontSize:"13px",fontWeight:700,color:col.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},cls.name),
              div({style:{fontSize:"11px",color:col.border,marginTop:"1px"}},getTimeForDay(cls,dayName)+" · "+stuCount+" student"+(stuCount!==1?"s":""))
            ),
            span({style:{fontSize:"13px",color:col.border,fontWeight:700,flexShrink:0}},"›")
          );
        })
      ):div({style:{padding:"4px 14px 10px",fontSize:"12px",color:"#cbd5e1"}},"No classes")
    );
  });
  return div({className:"card",style:{marginBottom:"14px"}},
    div({style:{fontSize:"12px",fontWeight:700,color:"#1e3a5f",marginBottom:"10px",display:"flex",justifyContent:"space-between",alignItems:"center"}},
      span({},"This Week"),
      span({style:{fontSize:"10px",color:"#94a3b8",fontWeight:400}},weekDates[0].getDate()+" "+MONTHS[weekDates[0].getMonth()].slice(0,3)+" – "+weekDates[6].getDate()+" "+MONTHS[weekDates[6].getMonth()].slice(0,3))
    ),
    ...dayCards
  );
}

function getClassColor(classId){const idx=state.data.classes.findIndex(c=>c.id===classId);return CLASS_COLORS[idx%CLASS_COLORS.length]||CLASS_COLORS[0];}

function renderCalendar(){
  const months=[...new Set(weeks.flat().map(d=>`${MONTHS[d.getMonth()]} ${d.getFullYear()}`))].join(" – ");
  const dayHeaders=div({style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"3px",marginBottom:"4px"}},...SHORT.map(s=>div({style:{textAlign:"center",fontSize:"10px",fontWeight:700,color:"#94a3b8"}},s)));
  const weekRows=weeks.map(week=>div({style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"3px",marginBottom:"3px"}},...week.map(dateObj=>{
    const iso=toISO(dateObj),isToday=iso===todayISO,isSel=iso===state.selectedDate;
    const isPast=dateObj<new Date(todayISO);
    const hasClass=hasTutoringOnDate(dateObj);
    return div({style:{textAlign:"center",padding:"5px 2px",borderRadius:"7px",cursor:"pointer",background:isSel?"#1e3a5f":isToday?"#dbeafe":"transparent",border:isToday&&!isSel?"1.5px solid #3b82f6":"1.5px solid transparent"},onClick:()=>setState({selectedDate:iso,view:"week"})},
      div({style:{fontSize:"13px",fontWeight:isToday||isSel?800:500,color:isSel?"#fff":isToday?"#1d4ed8":isPast?"#cbd5e1":"#0f172a"}},dateObj.getDate()+""),
      div({style:{display:"flex",justifyContent:"center",gap:"2px",marginTop:"1px"}},
        hasClass?span({style:{width:"4px",height:"4px",borderRadius:"50%",background:isSel?"#fde68a":"#f59e0b",display:"inline-block"}}):span({})
      )
    );
  })));
  return div({className:"card",style:{marginBottom:"14px"}},
    div({style:{fontSize:"13px",fontWeight:700,color:"#1e3a5f",marginBottom:"10px",display:"flex",justifyContent:"space-between"}},span({},months),span({style:{fontSize:"11px",color:"#94a3b8",fontWeight:400}},"4 weeks")),
    dayHeaders,...weekRows
  );
}

function renderDayPanel(){
  const[sy,sm,sd]=state.selectedDate.split('-').map(Number);
  const selDateObj=new Date(sy,sm-1,sd),rawDay=selDateObj.getDay();
  const selDayName=rawDay===0?"Sunday":DAYS[rawDay-1],isToday=state.selectedDate===todayISO;
  const heading=div({style:{display:"flex",alignItems:"baseline",justifyContent:"space-between",marginBottom:"12px"}},div({},
    span({style:{fontWeight:800,fontSize:"16px",color:"#1e3a5f"}},selDayName),
    span({style:{marginLeft:"8px",fontSize:"13px",color:"#64748b"}},formatDate(selDateObj)),
    isToday?span({style:{marginLeft:"8px",background:"#3b82f6",color:"#fff",borderRadius:"5px",padding:"1px 7px",fontSize:"11px",fontWeight:700}},"Today"):span({})
  ));
  const dayClasses=classesOnDay(selDayName);
  const classCards=dayClasses.length===0?[div({style:{color:"#94a3b8",fontSize:"13px",marginBottom:"10px"}},"No tutoring classes on "+selDayName+"s.")]:dayClasses.map(cls=>{
    const col=getClassColor(cls.id),students=studentsInClass(cls);
    const chips=students.length>0?div({style:{marginTop:"10px",display:"flex",flexDirection:"column",gap:"8px"}},...students.map(stu=>{
      const status=getAttStatus(cls.id,stu.id,state.selectedDate);
      return div({style:{display:"flex",alignItems:"center",gap:"6px",flexWrap:"wrap"}},

function initFirebase(){

      if(user){

        startDataListener();

        if(dataListener){db.ref('data/'+(state.user&&state.user.uid)).off();dataListener=null;}
